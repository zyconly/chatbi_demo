<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="160" y1="80" x2="240" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F5C8A0"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="120" y1="240" x2="280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="140" y1="50" x2="260" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#2D1F14"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="50" y1="20" x2="120" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bodyClip">
      <rect x="0" y="0" width="400" height="400" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)"/>

  <!-- Chat bubbles decoration -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Top-left bubble -->
    <rect x="42" y="38" width="72" height="28" rx="14" fill="url(#glowGrad)"/>
    <rect x="50" y="48" width="30" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="84" y="48" width="18" height="3" rx="1.5" fill="white" opacity="0.5"/>
    <!-- Second bubble -->
    <rect x="32" y="74" width="56" height="22" rx="11" fill="#A5B4FC" opacity="0.6"/>
    <rect x="40" y="82" width="24" height="3" rx="1.5" fill="white" opacity="0.6"/>
    <rect x="68" y="82" width="12" height="3" rx="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Body / Shirt -->
  <g filter="url(#softShadow)">
    <!-- Neck -->
    <rect x="178" y="232" width="44" height="30" rx="6" fill="url(#skinGrad)"/>
    <!-- Shoulders & torso -->
    <path d="M108 310 C108 265, 145 248, 200 248 C255 248, 292 265, 292 310 L292 410 L108 410 Z" fill="url(#shirtGrad)"/>
    <!-- Collar / turtleneck -->
    <path d="M162 252 C162 242, 175 236, 200 236 C225 236, 238 242, 238 252 L238 268 C238 274, 225 278, 200 278 C175 278, 162 274, 162 268 Z" fill="#475569"/>
    <!-- Collar highlight -->
    <path d="M170 254 C170 248, 180 244, 200 244 C220 244, 230 248, 230 254" stroke="#64748B" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Head -->
  <g filter="url(#softShadow)">
    <!-- Head shape -->
    <ellipse cx="200" cy="165" rx="72" ry="82" fill="url(#skinGrad)"/>
    <!-- Ear left -->
    <ellipse cx="130" cy="158" rx="14" ry="18" fill="#F5C8A0"/>
    <ellipse cx="132" cy="158" rx="8" ry="12" fill="#F0B88C"/>
    <!-- Ear right -->
    <ellipse cx="270" cy="158" rx="14" ry="18" fill="#F5C8A0"/>
    <ellipse cx="268" cy="158" rx="8" ry="12" fill="#F0B88C"/>
  </g>

  <!-- Hair -->
  <g>
    <!-- Main hair mass -->
    <path d="M128 148 C128 98, 150 62, 200 58 C250 62, 272 98, 272 148 C272 135, 262 100, 200 92 C138 100, 128 135, 128 148 Z" fill="url(#hairGrad)"/>
    <!-- Hair top volume -->
    <path d="M145 120 C148 78, 168 58, 200 55 C232 58, 255 78, 258 110 C252 82, 230 68, 200 65 C170 68, 150 85, 145 120 Z" fill="#3D2B1C"/>
    <!-- Side parting / swept hair -->
    <path d="M142 130 C142 95, 160 70, 200 65 C175 75, 158 95, 155 130 Z" fill="#3D2B1C" opacity="0.6"/>
    <!-- Hair right side -->
    <path d="M258 130 C258 95, 240 70, 200 65 C225 75, 242 95, 245 130 Z" fill="#2D1F14" opacity="0.4"/>
  </g>

  <!-- Face features -->
  <g>
    <!-- Eyes -->
    <!-- Left eye white -->
    <ellipse cx="175" cy="170" rx="18" ry="16" fill="white"/>
    <!-- Left iris -->
    <ellipse cx="177" cy="171" rx="10" ry="11" fill="#2D1F14"/>
    <!-- Left pupil -->
    <ellipse cx="179" cy="169" rx="5" ry="5.5" fill="#0F0A07"/>
    <!-- Left eye highlight -->
    <circle cx="182" cy="166" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="174" cy="174" r="2" fill="white" opacity="0.4"/>

    <!-- Right eye white -->
    <ellipse cx="225" cy="170" rx="18" ry="16" fill="white"/>
    <!-- Right iris -->
    <ellipse cx="227" cy="171" rx="10" ry="11" fill="#2D1F14"/>
    <!-- Right pupil -->
    <ellipse cx="229" cy="169" rx="5" ry="5.5" fill="#0F0A07"/>
    <!-- Right eye highlight -->
    <circle cx="232" cy="166" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="224" cy="174" r="2" fill="white" opacity="0.4"/>

    <!-- Eyebrows -->
    <path d="M158 152 C162 146, 175 144, 190 148" stroke="#3D2B1C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M210 148 C225 144, 238 146, 242 152" stroke="#3D2B1C" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Nose -->
    <path d="M196 185 C198 192, 202 192, 204 185" stroke="#E0A880" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Mouth - friendly smile -->
    <path d="M178 202 C185 212, 195 216, 200 216 C205 216, 215 212, 222 202" stroke="#C4724A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Smile fill -->
    <path d="M180 203 C187 213, 197 217, 200 217 C203 217, 213 213, 220 203 C215 208, 205 210, 200 210 C195 210, 185 208, 180 203 Z" fill="#C4724A" opacity="0.3"/>

    <!-- Blush -->
    <ellipse cx="158" cy="195" rx="14" ry="8" fill="#FFB5A0" opacity="0.3"/>
    <ellipse cx="242" cy="195" rx="14" ry="8" fill="#FFB5A0" opacity="0.3"/>
  </g>

  <!-- Glasses (optional professional touch) -->
  <g stroke="#64748B" stroke-width="2.5" fill="none" opacity="0.85">
    <!-- Left lens -->
    <rect x="154" y="158" width="42" height="28" rx="14" />
    <!-- Right lens -->
    <rect x="204" y="158" width="42" height="28" rx="14" />
    <!-- Bridge -->
    <path d="M196 172 C198 168, 202 168, 204 172"/>
    <!-- Left arm -->
    <path d="M154 168 L138 162"/>
    <!-- Right arm -->
    <path d="M246 168 L262 162"/>
  </g>

  <!-- Headset (customer service style) -->
  <g>
    <!-- Headband -->
    <path d="M126 152 C126 100, 155 72, 200 68 C245 72, 274 100, 274 152" stroke="#475569" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left earpad -->
    <rect x="116" y="145" width="18" height="28" rx="9" fill="#334155"/>
    <rect x="119" y="149" width="12" height="20" rx="6" fill="#475569"/>
    <!-- Right earpad -->
    <rect x="266" y="145" width="18" height="28" rx="9" fill="#334155"/>
    <rect x="269" y="149" width="12" height="20" rx="6" fill="#475569"/>
    <!-- Microphone arm -->
    <path d="M122 168 C110 178, 108 198, 120 210 C126 216, 140 218, 152 216" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Microphone head -->
    <ellipse cx="155" cy="215" rx="10" ry="8" fill="#334155"/>
    <ellipse cx="155" cy="215" rx="6" ry="5" fill="#64748B"/>
    <!-- Mic holes -->
    <circle cx="153" cy="213" r="1" fill="#334155"/>
    <circle cx="157" cy="213" r="1" fill="#334155"/>
    <circle cx="155" cy="217" r="1" fill="#334155"/>
  </g>

  <!-- Subtle ambient glow around character -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#818CF8" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#A5B4FC" stroke-width="0.3" opacity="0.1"/>
</svg>
